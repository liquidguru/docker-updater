services:
  docker-updater:
    # For production use, replace this build block with:
    # image: ghcr.io/liquidguru/docker-updater:latest
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: docker-updater
    restart: unless-stopped
    ports:
      - "9292:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume1/docker:/volume1/docker:ro
      - ./data:/app/data
      - ./app.py:/app/app.py:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    environment:
      - CHECK_TIME=03:00
      - TIMEZONE=Australia/Melbourne
      - NOTIFY_URL=    # optional: ntfy://ntfy.sh/your-topic or any Apprise URL
      - DOCKER_HOST=unix:///var/run/docker.sock
      # Optional login: set both values in .env (blank keeps open access).
      - AUTH_USERNAME=${AUTH_USERNAME:-}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      # Optional; auto-generated under /app/data when blank.
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-}
