<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Docker Updater</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --border: #30363d; --text: #e6edf3; --muted: #7d8590;
    --green: #3fb950; --orange: #d29922; --blue: #58a6ff;
    --red: #f85149; --purple: #bc8cff;
  }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; line-height:1.5; min-height:100vh; }

  header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px; position:sticky; top:0; z-index:100; }
  .header-row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .header-row h1 { font-size:16px; font-weight:600; white-space:nowrap; }
  .header-stats { display:flex; gap:12px; flex:1; flex-wrap:wrap; }
  .stat-chip { display:flex; align-items:center; gap:5px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:2px 10px; font-size:12px; }
  .stat-chip .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .header-right { display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .last-check { font-size:12px; color:var(--muted); }

  button { cursor:pointer; font-family:inherit; font-size:13px; border:none; border-radius:6px; padding:5px 14px; transition:opacity .15s,filter .15s; }
  button:hover { filter:brightness(1.15); }
  button:disabled { opacity:.45; cursor:default; filter:none; }
  .btn-primary   { background:#238636; color:#fff; }
  .btn-secondary { background:transparent; border:1px solid var(--border); color:var(--text); }
  .btn-ghost     { background:transparent; color:var(--muted); padding:5px 8px; }
  .btn-check     { background:#1f6feb; color:#fff; }
  .btn-sm        { padding:3px 10px; font-size:12px; }
  .btn-link      { background:transparent; color:var(--blue); padding:0; font-size:12px; text-decoration:underline; text-underline-offset:2px; }
  .btn-link:hover { filter:none; opacity:.8; }

  .tabs { display:flex; gap:4px; padding:12px 24px 0; border-bottom:1px solid var(--border); background:var(--surface); }
  .tab { padding:6px 14px; border-radius:6px 6px 0 0; cursor:pointer; font-size:13px; color:var(--muted); border:1px solid transparent; border-bottom:none; background:transparent; position:relative; bottom:-1px; }
  .tab:hover { color:var(--text); background:var(--surface2); }
  .tab.active { color:var(--text); background:var(--bg); border-color:var(--border); }
  .tab .badge { display:inline-block; background:var(--surface2); border-radius:10px; padding:0 6px; font-size:11px; margin-left:4px; color:var(--muted); }
  .tab.active .badge { background:var(--border); }

  main { max-width:960px; margin:0 auto; padding:20px 24px 60px; }

  .empty { text-align:center; padding:48px 24px; color:var(--muted); }
  .empty .emoji { font-size:36px; display:block; margin-bottom:10px; }

  .select-toolbar { display:flex; align-items:center; gap:10px; padding:8px 14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; }
  .select-toolbar.hidden { display:none; }
  .select-toolbar label { cursor:pointer; font-size:13px; user-select:none; }
  .select-divider { width:1px; height:16px; background:var(--border); margin:0 2px; }
  input[type="checkbox"] { width:15px; height:15px; cursor:pointer; accent-color:var(--orange); flex-shrink:0; }

  .container-list { display:flex; flex-direction:column; gap:8px; }
  .container-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 16px; display:grid; grid-template-columns:1fr auto; gap:8px 12px; align-items:center; transition:background .1s,border-color .1s; }
  .container-card.has-cb  { grid-template-columns:auto 1fr auto; }
  .container-card.status-update   { border-left:3px solid var(--orange); }
  .container-card.status-ok       { border-left:3px solid var(--green); }
  .container-card.status-deferred { border-left:3px solid var(--blue); }
  .container-card.status-unknown  { border-left:3px solid var(--border); }
  .container-card.updating        { border-left:3px solid var(--purple); }
  .container-card.selected { background:rgba(210,153,34,.06); border-color:rgba(210,153,34,.45); }

  .card-cb-wrap { display:flex; align-items:center; padding-right:2px; }
  .card-info { min-width:0; }
  .card-name { font-weight:600; font-size:14px; margin-bottom:2px; }
  .card-image { font-family:'Cascadia Code','Fira Code',Consolas,monospace; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-meta { font-size:11px; color:var(--muted); margin-top:3px; display:flex; align-items:center; gap:8px; }
  .card-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }

  .badge-status { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:2px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.4px; }
  .badge-update   { background:rgba(210,153,34,.15); color:var(--orange); border:1px solid rgba(210,153,34,.3); }
  .badge-ok       { background:rgba(63,185,80,.12);  color:var(--green);  border:1px solid rgba(63,185,80,.25); }
  .badge-deferred { background:rgba(88,166,255,.12); color:var(--blue);   border:1px solid rgba(88,166,255,.25); }
  .badge-unknown  { background:rgba(125,133,144,.1); color:var(--muted);  border:1px solid var(--border); }
  .badge-updating { background:rgba(188,140,255,.15); color:var(--purple); border:1px solid rgba(188,140,255,.3); }

  .spinner { width:12px; height:12px; border:2px solid rgba(188,140,255,.3); border-top-color:var(--purple); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .section-title { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:28px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .history-list { display:flex; flex-direction:column; gap:4px; }
  .history-item { display:flex; align-items:center; gap:8px; padding:7px 12px; background:var(--surface); border:1px solid var(--border); border-radius:6px; font-size:13px; }
  .history-name { font-weight:500; flex:1; min-width:0; }
  .history-image { font-family:monospace; font-size:11px; color:var(--muted); flex:2; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .history-time { font-size:11px; color:var(--muted); white-space:nowrap; }
  .history-status-success { color:var(--green); }
  .history-status-error   { color:var(--red); }

  /* Modals */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:10px; width:min(700px,95vw); max-height:80vh; display:flex; flex-direction:column; box-shadow:0 16px 48px rgba(0,0,0,.5); }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); }
  .modal-header h3 { font-size:14px; font-weight:600; }
  .modal-body { flex:1; overflow-y:auto; }
  .modal-footer { padding:12px 16px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; align-items:center; }

  /* Log modal */
  .log-output { font-family:'Cascadia Code','Fira Code',Consolas,monospace; font-size:12px; line-height:1.6; padding:16px; white-space:pre-wrap; word-break:break-all; color:#cdd9e5; min-height:200px; }
  .log-success { color:var(--green); font-weight:600; }
  .log-error   { color:var(--red);   font-weight:600; }
  .log-section { color:var(--blue); }

  /* Changelog modal */
  .changelog-body { padding:16px; }
  .changelog-loading { text-align:center; padding:32px; color:var(--muted); }
  .changelog-error { padding:16px; color:var(--red); font-size:13px; }
  .changelog-no-source { padding:16px; color:var(--muted); font-size:13px; line-height:1.6; }
  .release { border-bottom:1px solid var(--border); padding:16px 0; }
  .release:first-child { padding-top:0; }
  .release:last-child { border-bottom:none; }
  .release-header { display:flex; align-items:baseline; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .release-name { font-weight:600; font-size:14px; }
  .release-tag { font-family:monospace; font-size:11px; color:var(--muted); background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:1px 6px; }
  .release-date { font-size:11px; color:var(--muted); margin-left:auto; white-space:nowrap; }
  .release-prerelease { font-size:11px; color:var(--orange); background:rgba(210,153,34,.12); border:1px solid rgba(210,153,34,.3); border-radius:4px; padding:1px 6px; }
  .release-body { font-size:13px; line-height:1.65; color:#cdd9e5; white-space:pre-wrap; word-break:break-word; }
  .release-body h1,.release-body h2,.release-body h3 { font-size:13px; font-weight:600; color:var(--text); margin:10px 0 4px; }
  .release-body ul,.release-body ol { padding-left:18px; margin:4px 0; }
  .release-body li { margin:2px 0; }
  .release-body a { color:var(--blue); }
  .release-body code { font-family:monospace; background:var(--surface2); border-radius:3px; padding:1px 4px; font-size:11px; }
  .release-body strong { color:var(--text); }
  .changelog-github-link { display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--blue); margin-left:auto; }

  #checking-banner { display:none; background:rgba(88,166,255,.08); border:1px solid rgba(88,166,255,.2); border-radius:8px; padding:10px 16px; margin-bottom:12px; font-size:13px; color:var(--blue); align-items:center; gap:8px; }
  #checking-banner.visible { display:flex; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>🐳 Docker Updater</h1>
    <div class="header-stats" id="header-stats"></div>
    <div class="header-right">
      <span class="last-check" id="last-check-label">—</span>
      <button class="btn-check" id="check-btn" onclick="triggerCheck()">Check Now</button>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="update"   onclick="switchTab('update')">Updates <span class="badge" id="tab-count-update">0</span></button>
  <button class="tab"        data-tab="deferred" onclick="switchTab('deferred')">Deferred <span class="badge" id="tab-count-deferred">0</span></button>
  <button class="tab"        data-tab="ok"       onclick="switchTab('ok')">Up to Date <span class="badge" id="tab-count-ok">0</span></button>
  <button class="tab"        data-tab="unknown"  onclick="switchTab('unknown')">Unchecked <span class="badge" id="tab-count-unknown">0</span></button>
  <button class="tab"        data-tab="all"      onclick="switchTab('all')">All <span class="badge" id="tab-count-all">0</span></button>
</div>

<main>
  <div id="checking-banner"><span class="spinner"></span> Checking for updates…</div>

  <div id="select-toolbar" class="select-toolbar hidden">
    <input type="checkbox" id="select-all-cb" onchange="toggleSelectAll(this.checked)">
    <label for="select-all-cb">Select all</label>
    <span class="select-divider"></span>
    <span id="select-count" style="color:var(--muted);font-size:12px">0 selected</span>
    <div style="flex:1"></div>
    <button class="btn-primary btn-sm" id="update-selected-btn" onclick="updateSelected()" disabled>Update Selected (0)</button>
  </div>

  <div id="container-list" class="container-list"></div>

  <div class="section-title">Recent Updates</div>
  <div id="history-list" class="history-list"></div>
</main>

<!-- Log modal -->
<div class="modal-overlay" id="log-modal-overlay" onclick="closeLogModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="log-modal-title">Update log</h3>
      <button class="btn-ghost" onclick="closeLogModal()">✕</button>
    </div>
    <div class="modal-body"><div class="log-output" id="log-output"></div></div>
    <div class="modal-footer">
      <span id="log-status-text" style="color:var(--muted);font-size:12px;margin-right:auto"></span>
      <button class="btn-secondary btn-sm" onclick="closeLogModal()">Close</button>
    </div>
  </div>
</div>

<!-- Defer modal -->
<div class="modal-overlay" id="defer-modal-overlay" onclick="closeDeferModal(event)">
  <div class="modal" style="width:min(360px,95vw)">
    <div class="modal-header">
      <h3 id="defer-modal-title">Defer update</h3>
      <button class="btn-ghost" onclick="closeDeferModal()">✕</button>
    </div>
    <div class="modal-body" style="padding:16px">
      <p style="color:var(--muted);font-size:13px;margin-bottom:14px">Skip this update for:</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn-secondary" onclick="submitDefer(7)">7 days</button>
        <button class="btn-secondary" onclick="submitDefer(14)">14 days</button>
        <button class="btn-secondary" onclick="submitDefer(30)">30 days</button>
        <button class="btn-secondary" onclick="submitDefer(90)">90 days</button>
        <button class="btn-secondary" onclick="submitDefer(3650)" style="color:var(--muted)">Indefinitely</button>
      </div>
    </div>
  </div>
</div>

<!-- Changelog modal -->
<div class="modal-overlay" id="changelog-modal-overlay" onclick="closeChangelogModal(event)">
  <div class="modal" style="width:min(760px,95vw)">
    <div class="modal-header">
      <h3 id="changelog-modal-title">What's new</h3>
      <a id="changelog-github-link" class="changelog-github-link" href="#" target="_blank" rel="noopener" style="display:none">View on GitHub ↗</a>
      <button class="btn-ghost" onclick="closeChangelogModal()" style="margin-left:8px">✕</button>
    </div>
    <div class="modal-body">
      <div id="changelog-content" class="changelog-body"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary btn-sm" onclick="closeChangelogModal()">Close</button>
      <button class="btn-primary btn-sm" id="changelog-update-btn" onclick="changelogUpdate()">Update Now</button>
    </div>
  </div>
</div>

<script>
  let allContainers = [];
  let currentTab = 'update';
  let selectedNames = new Set();
  let logPollTimer = null;
  let logContainerName = null;
  let refreshTimer = null;
  let deferTarget = null;
  let changelogTarget = null;

  // ── Fetch ─────────────────────────────────────────────────────────────────

  async function fetchStatus() {
    try {
      const r = await fetch('/api/status');
      const data = await r.json();
      if (data.error) return;
      allContainers = data.containers || [];
      const updatable = new Set(allContainers.filter(c => c.status === 'update').map(c => c.name));
      selectedNames.forEach(n => { if (!updatable.has(n)) selectedNames.delete(n); });
      renderAll(data);
      const banner = document.getElementById('checking-banner');
      data.check_running ? banner.classList.add('visible') : banner.classList.remove('visible');
      document.getElementById('check-btn').disabled = data.check_running;
      clearTimeout(refreshTimer);
      const busy = allContainers.some(c => c.updating) || data.check_running;
      refreshTimer = setTimeout(fetchStatus, busy ? 2000 : 15000);
    } catch (e) {
      refreshTimer = setTimeout(fetchStatus, 10000);
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function renderAll(data) {
    updateTabCounts(allContainers);
    renderContainerList(allContainers, currentTab);
    renderHistory(data.history || []);
    renderHeaderStats(allContainers, data.last_check);
    updateSelectionUI();
  }

  function updateTabCounts(containers) {
    const counts = { update:0, deferred:0, ok:0, unknown:0 };
    containers.forEach(c => { if (c.status in counts) counts[c.status]++; });
    document.getElementById('tab-count-update').textContent   = counts.update;
    document.getElementById('tab-count-deferred').textContent = counts.deferred;
    document.getElementById('tab-count-ok').textContent       = counts.ok;
    document.getElementById('tab-count-unknown').textContent  = counts.unknown;
    document.getElementById('tab-count-all').textContent      = containers.length;
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    renderContainerList(allContainers, tab);
    updateSelectionUI();
  }

  function renderContainerList(containers, tab) {
    const list = document.getElementById('container-list');
    const visible = tab === 'all' ? containers : containers.filter(c => c.status === tab);
    if (!visible.length) {
      const msgs = {
        update:   { e:'✅', t:'All up to date',    s:'No updates available.' },
        deferred: { e:'⏸', t:'Nothing deferred',  s:'No containers are currently deferred.' },
        ok:       { e:'🎉', t:'All good',           s:'All containers have their latest image.' },
        unknown:  { e:'🔍', t:'Nothing unchecked', s:'Click Check Now to scan for updates.' },
        all:      { e:'🐳', t:'No containers',     s:'No registry-tracked containers found.' },
      };
      const m = msgs[tab] || msgs.all;
      list.innerHTML = `<div class="empty"><span class="emoji">${m.e}</span><strong>${m.t}</strong><p style="margin-top:6px">${m.s}</p></div>`;
      return;
    }
    list.innerHTML = visible.map(c => cardHTML(c)).join('');
  }

  function cardHTML(c) {
    const statusMap = {
      update:   '<span class="badge-status badge-update">Update Available</span>',
      ok:       '<span class="badge-status badge-ok">Up to Date</span>',
      deferred: `<span class="badge-status badge-deferred">Deferred until ${c.defer_until}</span>`,
      unknown:  '<span class="badge-status badge-unknown">Not Checked</span>',
    };
    const isUpdating = c.updating;
    const statusClass = isUpdating ? 'updating' : `status-${c.status}`;
    const isSelected = selectedNames.has(c.name);
    const badge = isUpdating
      ? `<span class="badge-status badge-updating"><span class="spinner"></span> Updating…</span>`
      : (statusMap[c.status] || '');
    const checkedAt = c.checked_at ? `Checked ${timeAgo(c.checked_at)}` : 'Not yet checked';

    const showCb = c.status === 'update' && !isUpdating;
    const cbHtml = showCb
      ? `<div class="card-cb-wrap"><input type="checkbox" class="card-cb" data-name="${esc(c.name)}" ${isSelected ? 'checked' : ''} onchange="toggleSelect('${esc(c.name)}', this.checked)"></div>`
      : '';

    // "What's new?" link in meta row for update-available cards
    const whatsNew = (c.status === 'update' || c.status === 'deferred') && !isUpdating && c.has_changelog
      ? `<button class="btn-link" onclick="openChangelog('${esc(c.name)}')">What's new?</button>`
      : '';

    let actions = '';
    if (isUpdating) {
      actions = `<button class="btn-secondary btn-sm" onclick="openLogModal('${esc(c.name)}')">View Log</button>`;
    } else {
      if (c.has_logs) actions += `<button class="btn-secondary btn-sm" onclick="openLogModal('${esc(c.name)}')">Last Log</button>`;
      if (c.status === 'update') {
        actions += `<button class="btn-primary btn-sm" onclick="confirmUpdate('${esc(c.name)}')">Update</button>
                    <button class="btn-secondary btn-sm" onclick="openDefer('${esc(c.name)}')">Defer ▾</button>`;
      } else if (c.status === 'deferred') {
        actions += `<button class="btn-secondary btn-sm" onclick="confirmUpdate('${esc(c.name)}')">Update Now</button>
                    <button class="btn-ghost btn-sm" onclick="undefer('${esc(c.name)}')">Remove Defer</button>`;
      }
    }

    return `<div class="container-card ${statusClass} ${showCb ? 'has-cb' : ''} ${isSelected ? 'selected' : ''}" id="card-${esc(c.name)}">
      ${cbHtml}
      <div class="card-info">
        <div class="card-name">${esc(c.name)}</div>
        <div class="card-image" title="${esc(c.image)}">${esc(c.image)}</div>
        <div class="card-meta">${checkedAt}${whatsNew ? `<span>·</span>${whatsNew}` : ''}</div>
      </div>
      <div class="card-actions">${badge}${actions}</div>
    </div>`;
  }

  function renderHeaderStats(containers, lastCheck) {
    const updates  = containers.filter(c => c.status === 'update').length;
    const deferred = containers.filter(c => c.status === 'deferred').length;
    const total    = containers.length;
    const parts = [];
    if (updates  > 0) parts.push(`<span class="stat-chip"><span class="dot" style="background:var(--orange)"></span>${updates} update${updates!==1?'s':''}</span>`);
    if (deferred > 0) parts.push(`<span class="stat-chip"><span class="dot" style="background:var(--blue)"></span>${deferred} deferred</span>`);
    parts.push(`<span class="stat-chip"><span class="dot" style="background:var(--muted)"></span>${total} tracked</span>`);
    document.getElementById('header-stats').innerHTML = parts.join('');
    document.getElementById('last-check-label').textContent = lastCheck ? `Checked ${timeAgo(lastCheck)}` : 'Not checked yet';
  }

  function renderHistory(history) {
    const el = document.getElementById('history-list');
    if (!history.length) { el.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">No updates recorded yet.</div>'; return; }
    el.innerHTML = history.map(h => {
      const ok = h.status === 'success';
      return `<div class="history-item">
        <span class="${ok ? 'history-status-success' : 'history-status-error'}">${ok ? '✅' : '❌'}</span>
        <span class="history-name">${esc(h.container)}</span>
        <span class="history-image">${esc(h.image)}</span>
        <span class="history-time">${timeAgo(h.updated_at)}</span>
      </div>`;
    }).join('');
  }

  // ── Selection ─────────────────────────────────────────────────────────────

  function toggleSelect(name, checked) {
    checked ? selectedNames.add(name) : selectedNames.delete(name);
    const card = document.getElementById(`card-${name}`);
    if (card) card.classList.toggle('selected', checked);
    updateSelectionUI();
  }

  function toggleSelectAll(checked) {
    const visible = (currentTab === 'all' ? allContainers : allContainers.filter(c => c.status === currentTab))
      .filter(c => c.status === 'update' && !c.updating);
    visible.forEach(c => {
      checked ? selectedNames.add(c.name) : selectedNames.delete(c.name);
      const card = document.getElementById(`card-${c.name}`);
      if (card) { card.classList.toggle('selected', checked); const cb = card.querySelector('.card-cb'); if (cb) cb.checked = checked; }
    });
    updateSelectionUI();
  }

  function updateSelectionUI() {
    const visible = (currentTab === 'all' ? allContainers : allContainers.filter(c => c.status === currentTab))
      .filter(c => c.status === 'update' && !c.updating);
    const toolbar = document.getElementById('select-toolbar');
    if (!visible.length) { toolbar.classList.add('hidden'); return; }
    toolbar.classList.remove('hidden');
    const n = selectedNames.size;
    document.getElementById('select-count').textContent = n === 0 ? '0 selected' : `${n} selected`;
    const btn = document.getElementById('update-selected-btn');
    btn.textContent = `Update Selected (${n})`;
    btn.disabled = n === 0;
    const selectAll = document.getElementById('select-all-cb');
    const allChecked = visible.every(c => selectedNames.has(c.name));
    const someChecked = visible.some(c => selectedNames.has(c.name));
    selectAll.checked = allChecked;
    selectAll.indeterminate = someChecked && !allChecked;
  }

  async function updateSelected() {
    if (!selectedNames.size) return;
    const names = [...selectedNames];
    const list = names.map(n => `  • ${n}`).join('\n');
    if (!confirm(`Update ${names.length} container${names.length > 1 ? 's' : ''}?\n\n${list}\n\nEach will be pulled and recreated.`)) return;
    selectedNames.clear();
    updateSelectionUI();
    for (const name of names) await fetch(`/api/update/${encodeURIComponent(name)}`, { method:'POST' });
    fetchStatus();
  }

  // ── Single update / defer ─────────────────────────────────────────────────

  async function triggerCheck() {
    document.getElementById('check-btn').disabled = true;
    document.getElementById('checking-banner').classList.add('visible');
    await fetch('/api/check', { method:'POST' });
    fetchStatus();
  }

  function confirmUpdate(name) {
  }
    if (!confirm(`Update "${name}"?\n\nThis will pull the latest image and recreate the container.`)) return;
    startUpdate(name);
  }

  async function startUpdate(name) {
    selectedNames.delete(name);
    await fetch(`/api/update/${encodeURIComponent(name)}`, { method:'POST' });
    openLogModal(name);
    fetchStatus();
  }

  function openDefer(name) {
    deferTarget = name;
    document.getElementById('defer-modal-title').textContent = `Defer: ${name}`;
    document.getElementById('defer-modal-overlay').classList.add('open');
  }

  function closeDeferModal(e) {
    if (e && e.target !== document.getElementById('defer-modal-overlay')) return;
    document.getElementById('defer-modal-overlay').classList.remove('open');
    deferTarget = null;
  }

  async function submitDefer(days) {
    if (!deferTarget) return;
    await fetch(`/api/defer/${encodeURIComponent(deferTarget)}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({days}) });
    closeDeferModal();
    fetchStatus();
  }

  async function undefer(name) {
    await fetch(`/api/undefer/${encodeURIComponent(name)}`, { method:'POST' });
    fetchStatus();
  }

  // ── Changelog modal ───────────────────────────────────────────────────────

  async function openChangelog(name) {
    changelogTarget = name;
    document.getElementById('changelog-modal-title').textContent = `What's new — ${name}`;
    document.getElementById('changelog-github-link').style.display = 'none';
    document.getElementById('changelog-content').innerHTML = '<div class="changelog-loading"><span class="spinner" style="width:18px;height:18px;border-width:3px"></span><p style="margin-top:10px">Fetching release notes…</p></div>';
    document.getElementById('changelog-modal-overlay').classList.add('open');

    try {
      const r = await fetch(`/api/changelog/${encodeURIComponent(name)}`);
      const data = await r.json();
      renderChangelog(data);
    } catch (e) {
      document.getElementById('changelog-content').innerHTML = `<div class="changelog-error">Failed to fetch changelog: ${esc(String(e))}</div>`;
    }
  }

  function renderChangelog(data) {
    const content = document.getElementById('changelog-content');
    const ghLink  = document.getElementById('changelog-github-link');

    if (data.repo) {
      ghLink.href = `https://github.com/${data.repo}/releases`;
      ghLink.style.display = 'inline-flex';
    }

    if (data.error && !data.releases?.length) {
      content.innerHTML = `<div class="changelog-no-source">
        <p>${esc(data.error)}</p>
        ${data.source_url ? `<p style="margin-top:8px"><a href="${esc(data.source_url)}" target="_blank" style="color:var(--blue)">${esc(data.source_url)}</a></p>` : ''}
      </div>`;
      return;
    }

    if (!data.releases?.length) {
      content.innerHTML = '<div class="changelog-no-source">No release notes found.</div>';
      return;
    }

    content.innerHTML = data.releases.map(rel => `
      <div class="release">
        <div class="release-header">
          <span class="release-name">${esc(rel.name || rel.tag)}</span>
          <span class="release-tag">${esc(rel.tag)}</span>
          ${rel.prerelease ? '<span class="release-prerelease">pre-release</span>' : ''}
          <span class="release-date">${rel.date ? new Date(rel.date).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}) : ''}</span>
        </div>
        <div class="release-body">${renderMarkdown(rel.body)}</div>
      </div>`).join('');
  }

  function renderMarkdown(md) {
    if (!md) return '<em style="color:var(--muted)">No release notes provided.</em>';
    return md
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/^[-*] (.+)$/gm, '• $1')
      .replace(/\n/g, '<br>');
  }

  function closeChangelogModal(e) {
    if (e && e.target !== document.getElementById('changelog-modal-overlay')) return;
    document.getElementById('changelog-modal-overlay').classList.remove('open');
    changelogTarget = null;
  }

  function changelogUpdate() {
    if (!changelogTarget) return;
    const name = changelogTarget;
    closeChangelogModal();
    confirmUpdate(name);

  // ── Log modal ─────────────────────────────────────────────────────────────

  function openLogModal(name) {
    logContainerName = name;
    document.getElementById('log-modal-title').textContent = `Update log — ${name}`;
    document.getElementById('log-output').innerHTML = '';
    document.getElementById('log-status-text').textContent = '';
    document.getElementById('log-modal-overlay').classList.add('open');
    pollLogs();
  }

  function closeLogModal(e) {
    if (e && e.target !== document.getElementById('log-modal-overlay')) return;
    document.getElementById('log-modal-overlay').classList.remove('open');
    clearTimeout(logPollTimer);
    logContainerName = null;
  }

  async function pollLogs() {
    if (!logContainerName) return;
    try {
      const r = await fetch(`/api/logs/${encodeURIComponent(logContainerName)}`);
      const data = await r.json();
      const out = document.getElementById('log-output');
      out.innerHTML = data.logs.map(line => {
        if (line.startsWith('SUCCESS')) return `<span class="log-success">${esc(line)}</span>`;
        if (line.startsWith('ERROR'))   return `<span class="log-error">${esc(line)}</span>`;
        if (line.startsWith('▶'))       return `<span class="log-section">${esc(line)}</span>`;
        return esc(line);
      }).join('\n');
      out.scrollTop = out.scrollHeight;
      const statusEl = document.getElementById('log-status-text');
      if (data.running) {
        statusEl.textContent = 'Running…';
        logPollTimer = setTimeout(pollLogs, 800);
      } else {
        const last = data.logs[data.logs.length-1] || '';
        statusEl.textContent = last.startsWith('SUCCESS') ? '✅ Complete' : last.startsWith('ERROR') ? '❌ Failed' : 'Done';
        fetchStatus();
      }
    } catch (e) {
      logPollTimer = setTimeout(pollLogs, 2000);
    }
  }

  // ── Utils ─────────────────────────────────────────────────────────────────

  function timeAgo(iso) {
    const diff = (Date.now() - new Date(iso)) / 1000;
    if (diff < 60)    return 'just now';
    if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  fetchStatus();
</script>
</body>
